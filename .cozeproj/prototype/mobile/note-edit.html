<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>编辑笔记 - 拾光收藏</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          '--color-primary': '#4F46E5',
          '--color-primary-light': '#818CF8',
          '--color-on-primary': '#FFFFFF',
          '--color-background': '#F3F4F6',
          '--color-surface': '#FFFFFF',
          '--color-surface-container': '#EEEEF3',
          '--color-surface-container-low': '#F5F5F8',
          '--color-surface-container-lowest': '#FAFAFA',
          '--color-surface-container-high': '#E5E5EC',
          '--color-surface-container-highest': '#DCDCE3',
          '--color-on-surface': '#18181B',
          '--color-on-surface-variant': '#71717A',
          '--color-outline': '#D4D4D8',
          '--color-outline-variant': '#E4E4E7',
          '--shadow-card': '0 4px 16px rgba(79, 70, 229, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04)',
          '--shadow-float': '0 8px 32px rgba(79, 70, 229, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06)',
          '--radius-card': '24px',
          '--radius-button': '16px'
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @theme {
      --color-primary: #4F46E5;
      --color-primary-light: #818CF8;
      --color-on-primary: #FFFFFF;
      --color-background: #F3F4F6;
      --color-surface: #FFFFFF;
      --color-surface-container: #EEEEF3;
      --color-surface-container-low: #F5F5F8;
      --color-surface-container-lowest: #FAFAFA;
      --color-surface-container-high: #E5E5EC;
      --color-surface-container-highest: #DCDCE3;
      --color-on-surface: #18181B;
      --color-on-surface-variant: #71717A;
      --color-outline: #D4D4D8;
      --color-outline-variant: #E4E4E7;
      --shadow-card: 0 4px 16px rgba(79, 70, 229, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
      --shadow-float: 0 8px 32px rgba(79, 70, 229, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
      --radius-card: 24px;
      --radius-button: 16px;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body class="bg-background text-on-surface">

  <!-- 二级页导航（带返回按钮） -->
  <header class="bg-background sticky top-0 z-40 h-14 flex items-center justify-between px-4">
    <button class="w-10 h-10 flex items-center justify-center text-on-surface-variant rounded-full hover:bg-surface-container active:bg-surface-container-high transition-colors">
      <i data-lucide="arrow-left" class="w-5 h-5"></i>
    </button>
    <h1 class="text-base font-semibold text-on-surface">编辑笔记</h1>
    <button class="w-10 h-10 flex items-center justify-center text-primary rounded-full hover:bg-primary/10 transition-colors">
      <i data-lucide="check" class="w-5 h-5"></i>
    </button>
  </header>

  <!-- @main-content:start -->
  <main class="overflow-y-auto pb-6 px-4 pt-4">
    <!-- 笔记类型选择 -->
    <div class="mb-4">
      <p class="text-sm text-on-surface-variant mb-2">笔记类型</p>
      <div class="flex flex-wrap gap-2">
        <button class="px-4 py-2 bg-primary text-on-primary rounded-[12px] text-sm font-medium">金句</button>
        <button class="px-4 py-2 bg-surface-container text-on-surface-variant rounded-[12px] text-sm font-medium">观点</button>
        <button class="px-4 py-2 bg-surface-container text-on-surface-variant rounded-[12px] text-sm font-medium">疑问</button>
        <button class="px-4 py-2 bg-surface-container text-on-surface-variant rounded-[12px] text-sm font-medium">摘录</button>
        <button class="px-4 py-2 bg-surface-container text-on-surface-variant rounded-[12px] text-sm font-medium">灵感</button>
      </div>
    </div>

    <!-- 标签管理 -->
    <div class="mb-4">
      <p class="text-sm text-on-surface-variant mb-2">标签</p>
      <div class="flex flex-wrap gap-2 items-center">
        <span class="px-3 py-1.5 bg-purple-100 text-purple-700 rounded-full text-xs font-medium flex items-center gap-1">
          AI
          <i data-lucide="x" class="w-3 h-3 cursor-pointer hover:text-purple-900"></i>
        </span>
        <button class="px-3 py-1.5 bg-surface-container text-on-surface-variant rounded-full text-xs font-medium flex items-center gap-1">
          <i data-lucide="plus" class="w-3 h-3"></i>
          添加标签
        </button>
      </div>
    </div>

    <!-- 来源文章 -->
    <div class="mb-4">
      <p class="text-sm text-on-surface-variant mb-2">来源文章（可选）</p>
      <div class="bg-surface rounded-[16px] p-3 flex items-center gap-3 shadow-[var(--shadow-card)]">
        <div class="w-12 h-12 rounded-lg overflow-hidden bg-surface-container flex-shrink-0">
          <img src="https://images.unsplash.com/photo-1677442136019-21780ecad995?w=100&h=100&fit=crop" alt="文章封面" class="w-full h-full object-cover">
        </div>
        <div class="flex-1 min-w-0">
          <p class="text-sm font-medium text-on-surface truncate">深度学习在NLP中的应用与展望</p>
          <p class="text-xs text-on-surface-variant">知乎</p>
        </div>
        <button class="w-8 h-8 flex items-center justify-center text-on-surface-variant hover:text-red-500 transition-colors">
          <i data-lucide="x" class="w-4 h-4"></i>
        </button>
      </div>
    </div>

    <!-- 笔记内容 -->
    <div class="mb-4">
      <p class="text-sm text-on-surface-variant mb-2">摘录内容</p>
      <textarea class="w-full bg-surface rounded-[16px] px-4 py-3 text-on-surface border border-outline-variant/30 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none min-h-[100px] resize-none placeholder:text-on-surface-variant/50" placeholder="输入你摘录的内容...">「Transformer通过自注意力机制，能够并行处理序列中的所有位置，这是其相对于RNN的最大优势。」</textarea>
    </div>

    <!-- 个人感悟 -->
    <div class="mb-4">
      <p class="text-sm text-on-surface-variant mb-2">个人感悟（可选）</p>
      <textarea class="w-full bg-surface rounded-[16px] px-4 py-3 text-on-surface border border-outline-variant/30 focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none min-h-[80px] resize-none placeholder:text-on-surface-variant/50" placeholder="写下你的思考或感悟...">这句话让我意识到并行计算对于大模型训练的重要性。</textarea>
    </div>

    <!-- 底部操作 -->
    <div class="flex gap-3 mt-6">
      <button class="flex-1 py-3 bg-surface text-red-500 rounded-[16px] text-sm font-medium flex items-center justify-center gap-2 shadow-[var(--shadow-card)]">
        <i data-lucide="trash-2" class="w-4 h-4"></i>
        删除笔记
      </button>
      <button class="flex-1 py-3 bg-primary text-on-primary rounded-[16px] text-sm font-medium flex items-center justify-center gap-2">
        <i data-lucide="check" class="w-4 h-4"></i>
        保存修改
      </button>
    </div>

    <!-- 元信息 -->
    <div class="mt-6 pt-4 border-t border-outline-variant/20">
      <p class="text-xs text-on-surface-variant text-center">
        创建于 2024年1月18日 14:30<br>
        最后修改于 今天 16:42
      </p>
    </div>
  </main>
  <!-- @main-content:end -->

  <script>lucide.createIcons();</script>
</body>
</html>
