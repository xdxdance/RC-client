<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>添加文章 - 拾光收藏</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          '--color-primary': '#4F46E5',
          '--color-primary-light': '#818CF8',
          '--color-on-primary': '#FFFFFF',
          '--color-background': '#F3F4F6',
          '--color-surface': '#FFFFFF',
          '--color-surface-container': '#EEEEF3',
          '--color-surface-container-low': '#F5F5F8',
          '--color-surface-container-lowest': '#FAFAFA',
          '--color-surface-container-high': '#E5E5EC',
          '--color-surface-container-highest': '#DCDCE3',
          '--color-on-surface': '#18181B',
          '--color-on-surface-variant': '#71717A',
          '--color-outline': '#D4D4D8',
          '--color-outline-variant': '#E4E4E7',
          '--shadow-card': '0 4px 16px rgba(79, 70, 229, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04)',
          '--shadow-float': '0 8px 32px rgba(79, 70, 229, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06)',
          '--radius-card': '24px',
          '--radius-button': '16px'
        }
      }
    }
  </script>
  <style type="text/tailwindcss">
    @theme {
      --color-primary: #4F46E5;
      --color-primary-light: #818CF8;
      --color-on-primary: #FFFFFF;
      --color-background: #F3F4F6;
      --color-surface: #FFFFFF;
      --color-surface-container: #EEEEF3;
      --color-surface-container-low: #F5F5F8;
      --color-surface-container-lowest: #FAFAFA;
      --color-surface-container-high: #E5E5EC;
      --color-surface-container-highest: #DCDCE3;
      --color-on-surface: #18181B;
      --color-on-surface-variant: #71717A;
      --color-outline: #D4D4D8;
      --color-outline-variant: #E4E4E7;
      --shadow-card: 0 4px 16px rgba(79, 70, 229, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
      --shadow-float: 0 8px 32px rgba(79, 70, 229, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
      --radius-card: 24px;
      --radius-button: 16px;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
  </style>
</head>
<body class="bg-background text-on-surface">

  <!-- 一级页导航 -->
  <header class="bg-background sticky top-0 z-40 h-14 flex items-center justify-between px-4">
    <h1 class="text-lg font-bold text-on-surface">添加内容</h1>
  </header>

  <!-- @main-content:start -->
  <main class="overflow-y-auto pb-[calc(3.5rem+env(safe-area-inset-bottom))] px-4 pt-4">
    <!-- 链接输入区 -->
    <div class="bg-surface rounded-[24px] p-5 shadow-[var(--shadow-card)]">
      <h2 class="text-base font-semibold text-on-surface mb-3">粘贴文章链接</h2>
      <div class="relative">
        <input type="text" placeholder="https://..." class="w-full bg-surface-container rounded-[16px] px-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/50 border-none focus:outline-none focus:ring-2 focus:ring-primary/30">
        <div class="absolute right-3 top-1/2 -translate-y-1/2 flex gap-1">
          <button class="w-8 h-8 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
            <i data-lucide="clipboard" class="w-4 h-4"></i>
          </button>
          <button class="w-8 h-8 flex items-center justify-center text-on-surface-variant hover:text-primary transition-colors">
            <i data-lucide="scan" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
      <p class="text-xs text-on-surface-variant mt-2">支持微信、知乎、公众号等平台链接</p>
    </div>

    <!-- 或 -->
    <div class="flex items-center gap-4 py-6">
      <div class="flex-1 h-px bg-outline-variant"></div>
      <span class="text-sm text-on-surface-variant">或</span>
      <div class="flex-1 h-px bg-outline-variant"></div>
    </div>

    <!-- 快速添加笔记 -->
    <div class="bg-surface rounded-[24px] p-5 shadow-[var(--shadow-card)]">
      <h2 class="text-base font-semibold text-on-surface mb-3">快速记录灵感</h2>
      <textarea placeholder="写下你的好词好句、观点感悟..." class="w-full bg-surface-container rounded-[16px] px-4 py-3.5 text-on-surface placeholder:text-on-surface-variant/50 border-none focus:outline-none focus:ring-2 focus:ring-primary/30 min-h-[120px] resize-none"></textarea>
      <div class="flex items-center justify-between mt-3">
        <div class="flex gap-2">
          <button class="px-3 py-1.5 bg-surface-container rounded-full text-xs text-on-surface-variant flex items-center gap-1">
            <i data-lucide="tag" class="w-3 h-3"></i>
            添加标签
          </button>
        </div>
        <button class="px-5 py-2 bg-primary text-on-primary rounded-[16px] text-sm font-medium flex items-center gap-2">
          <i data-lucide="plus" class="w-4 h-4"></i>
          保存笔记
        </button>
      </div>
    </div>

    <!-- 最近浏览 -->
    <div class="mt-6">
      <h2 class="text-base font-semibold text-on-surface mb-3">最近添加</h2>
      <div class="space-y-3">
        <!-- 最近项 1 -->
        <div class="bg-surface rounded-[20px] p-4 shadow-[var(--shadow-card)] flex items-center gap-3">
          <div class="w-10 h-10 bg-primary/10 rounded-[12px] flex items-center justify-center">
            <i data-lucide="file-text" class="w-5 h-5 text-primary"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-on-surface truncate">深度学习在NLP中的应用...</p>
            <p class="text-xs text-on-surface-variant">刚刚保存</p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-on-surface-variant/50"></i>
        </div>

        <!-- 最近项 2 -->
        <div class="bg-surface rounded-[20px] p-4 shadow-[var(--shadow-card)] flex items-center gap-3">
          <div class="w-10 h-10 bg-primary/10 rounded-[12px] flex items-center justify-center">
            <i data-lucide="edit-3" class="w-5 h-5 text-primary"></i>
          </div>
          <div class="flex-1 min-w-0">
            <p class="text-sm font-medium text-on-surface truncate">「代码的可读性决定了...</p>
            <p class="text-xs text-on-surface-variant">10分钟前</p>
          </div>
          <i data-lucide="chevron-right" class="w-4 h-4 text-on-surface-variant/50"></i>
        </div>
      </div>
    </div>
  </main>
  <!-- @main-content:end -->

  <!-- 底部 TabBar -->
  <nav class="fixed bottom-0 left-0 right-0 z-40 bg-surface border-t border-outline-variant/20 flex justify-around items-center h-14 pb-[env(safe-area-inset-bottom)]">
    <a href="article-list.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
      <i data-lucide="bookmark" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">文章</span>
    </a>
    <a href="add-article.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-primary" aria-current="page">
      <i data-lucide="plus-circle" class="w-6 h-6"></i>
      <span class="text-[10px] font-bold tracking-wide">添加</span>
    </a>
    <a href="note-list.html" class="flex flex-col items-center gap-0.5 px-5 py-1.5 text-on-surface-variant hover:text-on-surface transition-colors">
      <i data-lucide="file-text" class="w-5 h-5"></i>
      <span class="text-[10px] font-bold tracking-wide">笔记</span>
    </a>
  </nav>

  <script>lucide.createIcons();</script>
</body>
</html>
